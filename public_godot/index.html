<!DOCTYPE html>

		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

	<!-- HTML lofi stream (same YT ID as public/index.html) — music only, not the game -->
<div id="ytmusic" style="position:fixed;width:2px;height:2px;left:0;bottom:0;opacity:0;pointer-events:none;overflow:hidden"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
(function () {
  var YT_ID = "rPjez8z61rI";
  var ytPlayer = null, ytReady = false, ytWant = false, ytVol = 100;
  window.onYouTubeIframeAPIReady = function () {
    try {
      ytPlayer = new YT.Player("ytmusic", {
        videoId: YT_ID,
        playerVars: {
          autoplay: 0, controls: 0, disablekb: 1, loop: 1, playlist: YT_ID,
          modestbranding: 1, playsinline: 1, rel: 0, fs: 0
        },
        events: {
          onReady: function () {
            ytReady = true;
            try { ytPlayer.setVolume(ytVol); ytPlayer.unMute(); } catch (e) {}
            if (ytWant) { try { ytPlayer.playVideo(); } catch (e2) {} }
          },
          onStateChange: function (e) {
            if (e.data === YT.PlayerState.ENDED) {
              try { ytPlayer.playVideo(); } catch (e3) {}
            }
          }
        }
      });
    } catch (e) { console.warn("[kamMusic]", e); }
  };
  window.kamMusicPlay = function (vol01) {
    ytWant = true;
    if (typeof vol01 === "number") ytVol = Math.round(Math.max(0, Math.min(1, vol01)) * 100);
    if (ytReady && ytPlayer) {
      try {
        ytPlayer.setVolume(ytVol);
        ytPlayer.unMute();
        ytPlayer.playVideo();
      } catch (e) {}
    }
  };
  window.kamMusicPause = function () {
    ytWant = false;
    if (ytReady && ytPlayer) {
      try { ytPlayer.pauseVideo(); } catch (e) {}
    }
  };
  window.kamMusicVol = function (vol01) {
    ytVol = Math.round(Math.max(0, Math.min(1, Number(vol01) || 0)) * 100);
    if (ytReady && ytPlayer) {
      try { ytPlayer.setVolume(ytVol); } catch (e) {}
    }
  };
})();
</script>

</head>
	<body>
		<canvas id="canvas">

		<div id="status">
			<img id="status-splash" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":27021248,"index.wasm":35376909},"focusCanvas":true,"gdextensionLibs":[]};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occured');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				navigator.serviceWorker.getRegistration().then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).catch((err) => {
				console.error('Error while registering service worker:', err);
			}).then(() => {
				window.location.reload();
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
