# Branch model
#   dev   — day-to-day work (commit + push freely)
#   main  — LIVE production (promote when ready)
#
# Flow
#   1. Commit and push to `dev`  → Verify always runs
#   2. ./scripts/promote-to-live.sh when ready → Verify + deploy on main
#
# Verify must NEVER be skipped/queued forever behind a stuck self-hosted deploy.
name: Deploy & verify

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

# Per-event group; cancel only older runs of the same ref so a stuck
# self-hosted deploy cannot park Verify for later pushes forever.
concurrency:
  group: kam-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── First check (always) ────────────────────────────────────────────
  verify:
    name: Verify
    runs-on: ubuntu-latest
    # Explicit: no path filters, no if: — every push/PR runs this job
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check server
        run: node --check server.js

      - name: Assert backend + Godot project
        run: |
          set -euo pipefail
          test -f server.js
          test -f scripts/db-backup.sh
          test -f scripts/promote-to-live.sh
          test -f scripts/push-dev.sh
          test -f godot/project.godot
          test -f godot/data/stages.json
          test -d godot/scripts
          test -f godot/scripts/render/CanvasCompat.gd
          if [ -d public_godot ]; then
            test -f public_godot/index.html
            test -f public_godot/index.wasm || test -f public_godot/index.pck
          else
            test -f public/index.html
          fi
          echo "Verify OK @ $(git rev-parse --short HEAD)"

  # ── Live deploy (main only, after Verify) ───────────────────────────
  deploy-live:
    name: Restart live services (self-hosted)
    needs: [verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    # Do not mark the whole workflow failed if the box is down — Verify still passed
    continue-on-error: true
    # Separate concurrency so a hung deploy can be cancelled by the next main push
    # without blocking Verify on ubuntu-latest (that job already finished).
    concurrency:
      group: kam-deploy-live
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install + restart
        run: |
          set -euo pipefail
          export NVM_DIR="$HOME/.nvm"
          # shellcheck disable=SC1091
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm ci --omit=dev
          bash scripts/pg-start.sh
          if systemctl --user cat killallmumus.service >/dev/null 2>&1; then
            systemctl --user restart killallmumus-pg.service || true
            systemctl --user restart killallmumus.service
          else
            bash scripts/install-user-services.sh
          fi
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health | grep -q '"ok":true'; then
              curl -fsS http://127.0.0.1:3000/api/health
              exit 0
            fi
            sleep 1
          done
          exit 1
