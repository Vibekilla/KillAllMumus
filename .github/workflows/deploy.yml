# Branch model
#   dev   — day-to-day work (commit + push freely)
#   main  — LIVE production (promote when ready)
#
# Flow
#   1. Commit and push to `dev`
#   2. ./scripts/promote-to-live.sh  (or merge/push main) when ready
#   3. Push to `main` → verify + deploy live
#
# IMPORTANT: do not force-reset `dev` from `main` after deploy.
# That wiped in-progress integration work under the old PR workflow.
name: Deploy & verify

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: killallmumus-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: node --check server.js
      - name: Assert backend + Godot project
        run: |
          test -f server.js
          test -f scripts/db-backup.sh
          test -f godot/project.godot
          test -f godot/data/stages.json
          test -d godot/scripts
          if [ -d public_godot ]; then
            test -f public_godot/index.html
            test -f public_godot/index.wasm || test -f public_godot/index.pck
          else
            test -f public/index.html
          fi

  deploy-live:
    name: Restart live services (self-hosted)
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install + restart
        run: |
          set -euo pipefail
          export NVM_DIR="$HOME/.nvm"
          # shellcheck disable=SC1091
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm ci --omit=dev
          bash scripts/pg-start.sh
          if systemctl --user cat killallmumus.service >/dev/null 2>&1; then
            systemctl --user restart killallmumus-pg.service || true
            systemctl --user restart killallmumus.service
          else
            bash scripts/install-user-services.sh
          fi
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health | grep -q '"ok":true'; then
              curl -fsS http://127.0.0.1:3000/api/health
              exit 0
            fi
            sleep 1
          done
          exit 1
